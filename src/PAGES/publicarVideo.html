<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar Video - HoneyMellow</title>

    <!--* --------  Favicon  -------- -->
    <link rel="icon" type="image/x-icon" href="../IMG/favicon.svg">

    <!--* --------  Hojas de estilos  -------- -->
    <link rel="stylesheet" href="../CSS/normalize.css">
    <link rel="stylesheet" href="../CSS/variables.css">
    <link rel="stylesheet" href="../CSS/styles.css">
    
    <!--* --------  Fuentes  -------- -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        main {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--color-secundario, #f0f0f0);
            border-radius: 8px;
        }

        .formulario {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .grupo-formulario {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 600;
            color: var(--color-primario, #333);
        }

        input, textarea {
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--color-primario, #007bff);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            padding: 0.75rem 1.5rem;
            background: var(--color-primario, #007bff);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: var(--color-primario-oscuro, #0056b3);
        }

        .mensaje {
            padding: 1rem;
            border-radius: 4px;
            text-align: center;
            display: none;
        }

        .mensaje.exito {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .mensaje.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .instrucciones {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #1565c0;
        }
    </style>
</head>
<body>
    <header>
        <figure id="logo-padre">
            <a href="../index.html">
                <img id="logo" src="../IMG/logo.png" alt="Logo HoneyWorks Mellow">
            </a>
        </figure>

        <nav>
            <a class="anclas" href="../index.html">Inicio</a>
            <a class="anclas" href="publicarVideo.html">Publicar Video</a>
        </nav>
    </header>

    <main>
        <h1>Publicar Nuevo Video</h1>
        
        <div class="instrucciones">
            <strong>ℹ️ Nota:</strong> Los videos se almacenan localmente en tu navegador. Si limpias el caché o cambias de navegador, se perderán.
        </div>

        <div id="mensaje" class="mensaje"></div>

        <form class="formulario" id="formularioVideo">
            <div class="grupo-formulario">
                <label for="id">ID del Video *</label>
                <input type="text" id="id" name="id" placeholder="ej: 97, 98, 99" required>
            </div>

            <div class="grupo-formulario">
                <label for="titulo">Título *</label>
                <input type="text" id="titulo" name="titulo" placeholder="ej: Nombre del Video" required>
            </div>

            <div class="grupo-formulario">
                <label for="descripcion">Descripción *</label>
                <textarea id="descripcion" name="descripcion" placeholder="Escribe la descripción del video" required></textarea>
            </div>

            <div class="grupo-formulario">
                <label for="idDrive">ID de Google Drive *</label>
                <input type="text" id="idDrive" name="idDrive" placeholder="ej: 1kZFK4zimZuaWVK2aJaB_tkBZw7jDQsdx" required>
            </div>

            <div class="grupo-formulario">
                <label for="portada">URL de la Portada (Miniatura) *</label>
                <input type="url" id="portada" name="portada" placeholder="ej: IMG/Miniaturas/97.webp" required>
            </div>

            <div class="grupo-formulario">
                <label for="url">URL del Video *</label>
                <input type="url" id="url" name="url" placeholder="ej: VIDEO/97.html" required>
            </div>

            <button type="submit">Publicar Video</button>
        </form>
    </main>

    <footer>
        <div id="favicon-padre">
            <img id="favicon" src="../IMG/favicon.svg" alt="">
            <p>V0.0.2</p>
        </div>

        <div id="creditos">
            <div id="pagina">
                <p class="margen">Pagina echa por</p>
                <a class="enlace" href="https://twitter.com/_Naoko__">Naoko</a>
            </div>
            
            <div id="videos">
                <p class="margen">Videos y traducción</p>
                <a href="https://twitter.com/PokespeFrantic" target="_blank" class="enlace">Yami</a>
            </div>

            <div id="autor">
                <p class="margen">Contenido original</p>
                <a href="https://twitter.com/HoneyWorks_828" target="_blank" class="enlace">HoneyWorks</a>
            </div>
        </div>
    </footer>

    <script src="../JS/publicarVideo.js"></script>
</body>
</html>
